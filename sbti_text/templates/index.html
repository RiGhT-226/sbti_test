<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBTI 傻乎乎人格测试 - Python版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "PingFang SC", sans-serif; }
        body { background-color: #f5f5f7; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; background: #fff; border-radius: 20px; padding: 30px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .page { display: none; flex-direction: column; align-items: center; }
        .page.active { display: flex; }
        .btn { width: 100%; padding: 15px 0; border: none; border-radius: 12px; background-color: #0071e3; color: #fff; font-size: 18px; cursor: pointer; transition: all 0.2s; }
        .btn:hover { background-color: #0077ed; transform: scale(1.02); }
        /* 首页 */
        .home-title { font-size: 28px; font-weight: bold; color: #1d1d1f; margin-bottom: 15px; text-align: center; }
        .home-desc { font-size: 16px; color: #86868b; text-align: center; margin-bottom: 40px; line-height: 1.5; }
        /* 答题页 */
        .progress-bar { width: 100%; height: 6px; background-color: #e8e8ed; border-radius: 3px; margin-bottom: 40px; overflow: hidden; }
        .progress-fill { height: 100%; background-color: #0071e3; transition: width 0.3s ease; }
        .question-title { font-size: 22px; font-weight: 600; color: #1d1d1f; margin-bottom: 30px; text-align: center; line-height: 1.4; }
        .option-list { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .option-item { width: 100%; padding: 15px 20px; border: 1px solid #e8e8ed; border-radius: 12px; background-color: #fafafa; font-size: 16px; color: #1d1d1f; cursor: pointer; transition: all 0.2s; text-align: left; }
        .option-item:hover { border-color: #0071e3; background-color: #f0f8ff; }
        /* 结果页 */
        .result-avatar { font-size: 80px; margin: 20px 0; }
        .result-tag { font-size: 32px; font-weight: bold; color: #0071e3; margin-bottom: 10px; }
        .result-desc { font-size: 16px; color: #1d1d1f; line-height: 1.6; text-align: center; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div id="homePage" class="page active">
            <h1 class="home-title">SBTI 傻乎乎人格测试</h1>
            <p class="home-desc">Python 后端版<br>3分钟解锁你的专属傻乎乎人格</p>
            <button class="btn" onclick="startTest()">开始测试</button>
        </div>

        <!-- 答题页 -->
        <div id="questionPage" class="page">
            <div class="progress-bar"><div id="progressFill" class="progress-fill" style="width: 0%"></div></div>
            <h2 id="questionTitle" class="question-title"></h2>
            <div id="optionList" class="option-list"></div>
        </div>

        <!-- 结果页 -->
        <div id="resultPage" class="page">
            <div class="result-avatar" id="resultAvatar"></div>
            <h1 class="result-tag" id="resultTag"></h1>
            <p class="result-desc" id="resultDesc"></p>
            <button class="btn" onclick="restartTest()">重新测试</button>
        </div>
    </div>

    <script>
        let questions = [];
        let currentQuestionIndex = 0;
        let userAnswers = [];

        // 开始测试：从后端获取题库
        async function startTest() {
            const res = await fetch('/api/questions');
            questions = await res.json();
            currentQuestionIndex = 0;
            userAnswers = [];
            renderQuestion();
            document.getElementById('homePage').classList.remove('active');
            document.getElementById('questionPage').classList.add('active');
        }

        // 渲染题目
        function renderQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('progressFill').style.width = `${((currentQuestionIndex + 1) / questions.length) * 100}%`;
            document.getElementById('questionTitle').innerText = q.title;
            const optionList = document.getElementById('optionList');
            optionList.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-item';
                btn.innerText = opt.text;
                btn.onclick = () => handleOptionClick(idx);
                optionList.appendChild(btn);
            });
        }

        // 处理选项点击
        function handleOptionClick(optionIdx) {
            userAnswers.push(optionIdx);
            currentQuestionIndex++;
            if (currentQuestionIndex >= questions.length) {
                submitTest();
            } else {
                renderQuestion();
            }
        }

        // 提交答案到后端，获取结果
        async function submitTest() {
            const res = await fetch('/api/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ answers: userAnswers })
            });
            const result = await res.json();
            document.getElementById('resultAvatar').innerText = result.avatar;
            document.getElementById('resultTag').innerText = result.personality;
            document.getElementById('resultDesc').innerText = result.desc;
            document.getElementById('questionPage').classList.remove('active');
            document.getElementById('resultPage').classList.add('active');
        }

        // 重新测试
        function restartTest() {
            document.getElementById('resultPage').classList.remove('active');
            document.getElementById('homePage').classList.add('active');
        }
    </script>
</body>
</html>
